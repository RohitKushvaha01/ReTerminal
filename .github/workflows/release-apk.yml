name: Build Release APK

on:
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew --no-daemon assembleFdroidRelease -x lintVitalFdroidRelease
      - run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/Fdroid/release/*.apk artifacts/Andlinux.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Andlinux-release-apk
          path: artifacts/Andlinux.apk
