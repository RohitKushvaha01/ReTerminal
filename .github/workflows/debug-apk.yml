name: Build AndLinux Alpha APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
      - reterminal-fork
    paths-ignore:
      - '**/*.md'

jobs:
  alpha-apk:
    name: Build installable alpha APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Prepare Gradle
        run: chmod +x gradlew

      - name: Build alpha APK
        run: ./gradlew --no-daemon assembleFdroidAlpha

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/Fdroid/alpha/*.apk artifacts/Andlinux.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Andlinux-apk
          path: artifacts/Andlinux.apk
