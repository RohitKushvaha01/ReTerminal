name: Build AndLinux APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build installable APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Prepare Gradle
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew --no-daemon assembleFdroidRelease

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/Fdroid/release/*.apk artifacts/Andlinux.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Andlinux-apk
          path: artifacts/Andlinux.apk
